name: nightshade_mobile
description: Nightshade 2.0 Mobile - Companion app for remote monitoring and control
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared packages
  nightshade_core:
    path: ../../packages/nightshade_core
  nightshade_ui:
    path: ../../packages/nightshade_ui
  nightshade_webrtc:
    path: ../../packages/nightshade_webrtc
  nightshade_app:
    path: ../../packages/nightshade_app
  nightshade_bridge:
    path: ../../packages/nightshade_bridge
  nightshade_planetarium:
    path: ../../packages/nightshade_planetarium
  nightshade_updater:
    path: ../../packages/nightshade_updater

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^14.0.0

  # Database (for local state)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18

  # Utilities
  flutter_hooks: ^0.20.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  path_provider: ^2.1.2
  path: ^1.8.3
  intl: ^0.20.2

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

  # URL launcher
  url_launcher: ^6.2.4

  # mDNS/Bonjour discovery
  nsd: ^3.0.0

  # Secure storage for auth tokens (Keychain / EncryptedSharedPreferences).
  # Audit §3.3: tokens must not live in plaintext SharedPreferences.
  flutter_secure_storage: ^9.2.2

  # QR code scanning
  mobile_scanner: ^5.2.3

  # Background operation support
  flutter_foreground_task: ^6.0.0
  flutter_local_notifications: ^18.0.0
  wakelock_plus: ^1.1.0
  battery_plus: ^5.0.0

  # Network connectivity monitoring
  connectivity_plus: ^5.0.0

  # Persists mobile-only preferences (e.g., Android immersive mode toggle).
  # The desktop AppSettings model is mobile-irrelevant for these UI choices.
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Pinned exact version across all 10 workspace packages to prevent
  # mixed-version drift. See docs/code-quality/audit-dart.md §10 #4.
  # Upgrade to ^5.0.0 is scheduled in W-TEST / CQ-W5-LINTS-UPGRADE.
  flutter_lints: 3.0.2
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  # NOTE: bundled sample sequences for the Sequencer > Library tab live in
  # the nightshade_core package's own pubspec asset declaration. Flutter
  # automatically picks them up as `packages/nightshade_core/assets/...`
  # at runtime via rootBundle — they do NOT need to be re-declared here.
  # Mobile users can browse the Library tab in the companion app.
