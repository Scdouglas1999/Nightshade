name: nightshade_mobile
description: Nightshade 2.0 Mobile - Companion app for remote monitoring and control
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Shared packages
  nightshade_core:
    path: ../../packages/nightshade_core
  nightshade_ui:
    path: ../../packages/nightshade_ui
  nightshade_webrtc:
    path: ../../packages/nightshade_webrtc
  nightshade_app:
    path: ../../packages/nightshade_app
  nightshade_planetarium:
    path: ../../packages/nightshade_planetarium
  nightshade_updater:
    path: ../../packages/nightshade_updater

  # State management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^14.0.0

  # Database (for local state)
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18

  # Utilities
  flutter_hooks: ^0.20.5
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  path_provider: ^2.1.2
  path: ^1.8.3

  

  
  # Icons
  lucide_icons: ^0.257.0
  
  # URL launcher
  url_launcher: ^6.2.4

  # mDNS/Bonjour discovery
  nsd: ^3.0.0

  # QR code scanning
  mobile_scanner: ^5.2.3

  # Background operation support
  flutter_foreground_task: ^6.0.0
  flutter_local_notifications: ^18.0.0
  wakelock_plus: ^1.1.0
  battery_plus: ^5.0.0

  # Network connectivity monitoring
  connectivity_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.6
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

