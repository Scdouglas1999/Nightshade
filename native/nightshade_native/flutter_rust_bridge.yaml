# Flutter Rust Bridge configuration
# https://cjycode.com/flutter_rust_bridge/

rust_input: crate::api
rust_root: bridge/
dart_output: ../../packages/nightshade_bridge/lib/src/
c_output: ../../packages/nightshade_bridge/ios/bridge_generated.h
duplicated_c_output:
  - ../../packages/nightshade_bridge/macos/bridge_generated.h
  - ../../packages/nightshade_bridge/linux/bridge_generated.h

# LLVM path for ffigen (fixes stdbool.h not found on Windows)
llvm_path:
  - 'C:\Program Files\LLVM'

# Enable features
full_dep: true

# Disable web platform (not needed - using headless server architecture)
web: false

# Enable error details and debugging
stop_on_error: true
dump_all: true

# Enable lifetime support for &'static references
enable_lifetime: true

