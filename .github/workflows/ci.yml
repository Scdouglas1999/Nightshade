name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  # Nightly schedule runs heavier matrix jobs (Windows Rust) without blocking PRs.
  # 04:00 UTC ≈ 21:00 PT, after most US contributors stop pushing.
  schedule:
    - cron: '0 4 * * *'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      # §7B.4 regression-pin: --min-files asserts the auditor still walks the
      # whole runtime tree. Raise the baseline whenever a new top-level
      # package or native crate is added; never lower it without justifying
      # which runtime files were legitimately removed.
      # Baselines: placeholder=797 (current 839), behavioral=796 (current 838),
      # fail_closed=1337 (current 1408). Each is current * 0.95 floored, so
      # routine deletions do not break CI but a glob/exclude regression does.
      - name: Placeholder/Stub Audit Gate (fail on any high-risk)
        # Two distinct guards run back-to-back:
        #   1. --fail-on-any-highrisk: blocks if ANY high-risk marker exists
        #      (current absolute zero policy). Required for v2.5.0 hardening.
        #   2. melos run audit:placeholders: invokes the script with
        #      --fail-on-new-highrisk + baseline compare, which catches
        #      *new* high-risk markers even if the absolute count was
        #      relaxed. Belt and braces — see audit-tests.md §7 gap #2.
        run: dart run tools/production/placeholder_audit.dart --allowlist docs/production-readiness/placeholder-allowlist.txt --fail-on-any-highrisk --min-files 797

      - name: Placeholder/Stub Audit Gate (fail on new vs baseline)
        # melos script wraps `--fail-on-new-highrisk
        # --compare-highrisk-baseline docs/production-readiness/highrisk-baseline.txt`
        # so a regression against the recorded baseline trips CI even when
        # the absolute-zero policy above is later relaxed.
        run: melos run audit:placeholders

      - name: Fail-Closed Policy Gate
        run: dart run tools/production/fail_closed_check.dart --min-files 1337

      - name: Behavioral Audit Gate
        run: dart run tools/production/behavioral_audit.dart --register docs/production-readiness/behavioral-audit-register.md --fail-on-unregistered --fail-on-open --report .behavioral_audit_hits.txt --min-files 796

      - name: Dependency Hygiene Gate
        run: dart run tools/production/dependency_hygiene.dart

      - name: Analyze code (production gate)
        run: dart run tools/production/analyzer_rollup.dart --policy docs/production-readiness/analyzer-policy.yaml --critical-codes docs/production-readiness/critical-warning-codes.txt --report docs/production-readiness/analyzer-rollup.json

  launch-gate:
    name: Launch Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Launch Analyzer Gate (zero production warnings)
        run: dart run tools/production/analyzer_rollup.dart --policy docs/production-readiness/analyzer-policy.yaml --critical-codes docs/production-readiness/critical-warning-codes.txt --report docs/production-readiness/analyzer-rollup.json

      # §7B.4 regression-pin: keep --min-files in sync with the analyze job
      # above. If you raise one baseline, raise both.
      - name: Runtime Placeholder Gate
        run: dart run tools/production/placeholder_audit.dart --allowlist docs/production-readiness/placeholder-allowlist.txt --fail-on-any-highrisk --min-files 797

      - name: Runtime Behavioral Gate
        run: dart run tools/production/behavioral_audit.dart --register docs/production-readiness/behavioral-audit-register.md --fail-on-unregistered --fail-on-open --report .behavioral_audit_hits.txt --min-files 796

  test-dart:
    name: Dart Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Run Dart tests
        run: melos run test

  test-rust:
    # Linux Rust runs on every PR + push for fast feedback.
    # audit-tests.md §7 gap #3 + roadmap R10.
    name: Rust Tests (linux)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/nightshade_native

      - name: Run Rust tests
        working-directory: native/nightshade_native
        run: cargo test --all-features --workspace

      - name: Run Rust clippy (workspace, deny warnings + high-value lints)
        working-directory: native/nightshade_native
        # High-value lint promotions per audit-rust.md §7 (clippy debt):
        #   - result_unit_err: forbids `Result<(), ()>` (use a real error type)
        #   - await_holding_lock: catches the FFI deadlock pattern audit
        #     flagged in §2.2 (locks held across `.await`).
        # We intentionally do NOT promote `clippy::pedantic` — too noisy
        # (7,140 warnings per audit-rust §7) and would block all PRs.
        run: cargo clippy --all-features --workspace --all-targets -- -D warnings -D clippy::result_unit_err -D clippy::await_holding_lock

  test-rust-windows:
    # Windows runs ONLY on:
    #   - push to main/master/develop
    #   - nightly schedule
    #   - PRs labeled `ci:windows-rust` (rare opt-in)
    # ASCOM only compiles on Windows; without this job `ascom/windows_impl.rs`
    # has zero CI exercise (audit-tests.md §7 gap #4, §8 #10).
    # Roadmap R10: PR cycle time stays low because most PRs don't touch
    # ascom/ — opt-in label is the escape hatch.
    name: Rust Tests (windows)
    runs-on: windows-latest
    timeout-minutes: 45
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:windows-rust'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/nightshade_native

      - name: Run Rust tests
        working-directory: native/nightshade_native
        # --workspace so the ascom/ crate (Windows-only) gets exercised here
        # in addition to the bridge/imaging/sequencer crates that already
        # build on Linux.
        run: cargo test --all-features --workspace

      - name: Run Rust clippy (workspace, deny warnings + high-value lints)
        working-directory: native/nightshade_native
        run: cargo clippy --all-features --workspace --all-targets -- -D warnings -D clippy::result_unit_err -D clippy::await_holding_lock

  cargo-duplicates:
    # Surface multi-semver duplicates of the same crate. audit-rust.md §5.3
    # called out base64, thiserror, socket2, getrandom, hashbrown,
    # windows-sys, windows-targets. We use `cargo tree --duplicates` which
    # is built into stable cargo (no extra install) and exit non-zero on
    # any duplicate via a wrapper check.
    name: Cargo Duplicate Versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/nightshade_native

      - name: Detect duplicate crate versions
        working-directory: native/nightshade_native
        # `cargo tree --duplicates` lists each duplicated crate once with
        # all versions. Empty output (exit 0 with nothing on stdout) means
        # no duplicates. We capture stdout, log it as a build annotation,
        # and only WARN today because audit-rust §5.3 documents the known
        # bloaters which are tracked in W-OBS / windows-upgrade. Bump to
        # `exit 1` once those are consolidated (see deny.toml skip list).
        run: |
          set -o pipefail
          output=$(cargo tree --duplicates --workspace --all-features 2>&1 || true)
          if [ -n "$output" ]; then
            echo "::group::Duplicate crate versions detected"
            echo "$output"
            echo "::endgroup::"
            echo "::warning::Duplicate semver versions found. See native/nightshade_native/deny.toml skip list and audit-rust.md §5.3."
          else
            echo "No duplicate crate versions detected."
          fi

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Check Dart formatting
        run: melos run format -- --set-exit-if-changed

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        working-directory: native/nightshade_native
        run: cargo fmt --all -- --check

  build-test:
    name: Build Test (Desktop)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/nightshade_native

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Build Rust library (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: native/nightshade_native
        run: cargo build --release --manifest-path bridge/Cargo.toml

      - name: Build Rust library (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: native/nightshade_native
        run: cargo build --release --manifest-path bridge/Cargo.toml

      - name: Build Rust library (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: native/nightshade_native
        run: |
          # Try to build for the current architecture
          cargo build --release --manifest-path bridge/Cargo.toml || true

      - name: Test build Flutter app
        working-directory: apps/desktop
        run: flutter build ${{ matrix.platform }} --debug

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap workspace
        run: melos bootstrap

      - name: Install coverage tools
        run: dart pub global activate coverage

      - name: Run tests with coverage
        run: melos run test -- --coverage

      - name: Generate coverage report
        run: |
          dart pub global run coverage:format_coverage \
            --lcov \
            --in=coverage \
            --out=coverage/lcov.info \
            --report-on=lib

      - name: Upload coverage to Codecov
        # audit-tests.md §7 gap #6: previous config used
        # `fail_ci_if_error: false`, which silently swallowed upload
        # failures. Bumping to true so a misconfigured Codecov token or
        # network blip is visible. The coverage *threshold* itself is
        # enforced separately via `codecov.yml` at the repo root, which
        # the codecov-action picks up automatically (target:auto with
        # threshold:1% → fail on >1% regression).
        uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}
        # Don't break PRs from forks where the token isn't available.
        # Forked-PR coverage uploads are best-effort; main-branch uploads
        # are gated.
        continue-on-error: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
