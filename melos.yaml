name: nightshade
repository: https://github.com/Scoduglas1999/Nightshade2

packages:
  - apps/*
  - packages/*

command:
  version:
    linkToCommits: true
    workspaceChangelog: true

  bootstrap:
    usePubspecOverrides: true
    runPubGetInParallel: true

scripts:
  # ==========================================================================
  # Development Commands
  # ==========================================================================

  dev:
    run: powershell -ExecutionPolicy Bypass -File scripts/dev.ps1
    description: Full dev rebuild (FRB + Rust + copy DLLs) and run Flutter

  dev:norun:
    run: powershell -ExecutionPolicy Bypass -File scripts/dev.ps1 -NoRun
    description: Full dev rebuild without running Flutter

  dev:quick:
    run: powershell -ExecutionPolicy Bypass -File scripts/dev.ps1 -SkipFrb
    description: Quick rebuild (skip FRB regen - use when only Dart/Rust impl changed)

  dev:clean:
    run: powershell -ExecutionPolicy Bypass -File scripts/dev.ps1 -Clean
    description: Clean all build artifacts and rebuild from scratch

  # ==========================================================================
  # Code Quality
  # ==========================================================================

  analyze:
    run: dart run melos exec -- dart analyze .
    description: Run dart analyze in all packages

  analyze:production:
    run: dart run tools/production/analyzer_rollup.dart
    description: Run analyzer rollup with zero-error/critical-warning gate

  audit:placeholders:
    run: dart run tools/production/placeholder_audit.dart --fail-on-new-highrisk --compare-highrisk-baseline docs/production-readiness/highrisk-baseline.txt
    description: Scan placeholder/stub markers and fail on new high-risk markers

  audit:public-release-gate:
    run: dart run tools/production/public_release_gate.dart
    description: Combine release evidence artifacts into one conservative ship/no-ship gate

  audit:public-release-gate:self-test:
    run: dart run tools/production/public_release_gate_self_test.dart
    description: Self-test public release gate readiness and stale split-plan detection against temporary fixtures

  audit:public-release-blocker-inputs:
    run: dart run tools/production/public_release_blocker_inputs.dart
    description: List the exact missing input and evidence required to clear current public release blockers

  audit:public-release-blocker-inputs:self-test:
    run: dart run tools/production/public_release_blocker_inputs_self_test.dart
    description: Self-test public release blocker input mappings against temporary blocked and ready fixtures

  audit:public-release-external-evidence:
    run: dart run tools/production/public_release_external_evidence.dart
    description: Validate manual or external evidence files required for public release blockers

  audit:public-release-external-evidence:self-test:
    run: dart run tools/production/public_release_external_evidence_self_test.dart
    description: Self-test the public release external evidence verifier against temporary fixtures

  audit:public-release-completion:
    run: dart run tools/production/public_release_completion_audit.dart
    description: Map goal.txt P0 public release requirements to concrete evidence and remaining blockers

  audit:public-release-completion:self-test:
    run: dart run tools/production/public_release_completion_audit_self_test.dart
    description: Self-test the public release completion auditor against temporary blocked and achieved fixtures

  audit:public-release-owner-checklist:
    run: dart run tools/production/public_release_owner_checklist.dart
    description: Generate release-owner checklist from structured public release completion audit fields

  audit:public-release-owner-checklist:self-test:
    run: dart run tools/production/public_release_owner_checklist_self_test.dart
    description: Self-test generated release-owner checklist rendering against temporary completion audit fixtures

  audit:public-release-checklist:
    run: dart run tools/production/public_release_checklist_audit.dart
    description: Audit the public release checklist item status and evidence-note coverage

  audit:public-release-checklist:self-test:
    run: dart run tools/production/public_release_checklist_audit_self_test.dart
    description: Self-test public release checklist counting, evidence-note detection, and fail-on-unchecked behavior

  audit:public-release-self-tests:
    run: dart run tools/production/public_release_self_tests.dart
    description: Run all public release verifier self-tests against temporary fixtures

  audit:fail-closed:
    run: dart run tools/production/fail_closed_check.dart
    description: Enforce fail-closed backend policy checks

  audit:ui-consistency:
    run: dart run tools/production/ui_consistency_audit.dart
    description: Report raw UI styling, fake callbacks, and headless route advertisement drift

  audit:oversized-files:
    run: dart run tools/production/oversized_file_audit.dart
    description: Report oversized hand-authored Dart files for planned refactors

  audit:oversized-files:self-test:
    run: dart run tools/production/oversized_file_audit_self_test.dart
    description: Self-test oversized file audit thresholds and exclusions against temporary fixtures

  audit:developer-quality:
    run: dart run tools/production/developer_quality_audit.dart
    description: Roll up UI consistency, headless route policy, and oversized-file developer-quality audit signals

  audit:developer-quality:self-test:
    run: dart run tools/production/developer_quality_audit_self_test.dart
    description: Self-test developer quality audit pass/fail behavior against temporary fixtures

  audit:windows-bundle:
    run: dart run tools/production/windows_bundle_audit.dart
    description: Verify the Windows release bundle has required assets and no dev placeholders

  audit:headless-api-contract:
    run: dart run tools/production/headless_api_contract_audit.dart
    description: Verify headless route registration, advertised endpoints, OpenAPI coverage, and NetworkBackend calls stay aligned

  audit:headless-route-policy:
    run: dart run tools/production/headless_route_policy_audit.dart
    description: Verify headless request-size limits, rate limits, and high-risk audit metadata

  audit:headless-response-helpers:
    run: dart run tools/production/headless_response_helper_audit.dart
    description: Verify typed headless JSON response helpers exist, are tested, and raw response debt is counted

  audit:headless-response-helpers:self-test:
    run: dart run tools/production/headless_response_helper_audit_self_test.dart
    description: Self-test headless response helper audit pass/fail behavior against temporary fixtures

  audit:dependency-hygiene:
    run: dart run tools/production/dependency_hygiene.dart
    description: Verify workspace packages declare direct dependencies for lib imports

  audit:hardware-availability:windows:
    run: dart run tools/production/hardware_availability_probe.dart
    description: Launch the packaged Windows headless app and record discovered hardware classes for release smoke planning

  audit:linux-environment:
    run: dart run tools/production/linux_environment_probe.dart
    description: Probe WSL and Docker availability for Linux release build verification

  audit:linux-release-package-metadata:
    run: dart run tools/production/linux_release_package_metadata.dart
    description: Package a Linux release bundle and write artifact size/hash metadata

  audit:linux-release-package-metadata:self-test:
    run: dart run tools/production/linux_release_package_metadata_self_test.dart
    description: Self-test Linux release package metadata and evidence generation against a temporary bundle

  audit:linux-release-workflow:
    run: dart run tools/production/linux_release_workflow_audit.dart
    description: Verify Linux release GitHub Actions workflow and package metadata generator wiring

  audit:linux-release-workflow:self-test:
    run: dart run tools/production/linux_release_workflow_audit_self_test.dart
    description: Self-test Linux release workflow audit against temporary workflow fixtures

  audit:manual-migration:
    run: cd packages/nightshade_core && flutter test tool/production_migration_probe.dart
    description: Record or verify older real profile/database migration evidence

  audit:migration-regression:
    run: dart run tools/production/migration_regression_audit.dart
    description: Verify synthetic old-schema/profile migration fixture coverage without satisfying the real artifact gate

  audit:migration-regression:self-test:
    run: dart run tools/production/migration_regression_audit_self_test.dart
    description: Self-test migration regression audit pass/fail behavior against temporary fixtures

  audit:release-staging:
    run: dart run tools/production/release_staging_audit.dart
    description: Classify dirty worktree entries into review buckets for clean release branch staging

  audit:release-pr-plan:
    run: dart run tools/production/release_pr_split_plan.dart
    description: Convert the release staging audit into an explicit proposed PR split plan

  audit:release-pr-owner-matrix:
    run: dart run tools/production/release_pr_owner_matrix.dart
    description: Convert release PR split buckets into owner decision groups and draft PR descriptions

  audit:release-pr-staged-branch:
    run: dart run tools/production/release_pr_staged_branch_validator.dart
    description: Validate staged index or release branch diff against the owner bucket decision matrix

  audit:release-pr-owner-matrix:self-test:
    run: dart run tools/production/release_pr_owner_matrix_self_test.dart
    description: Self-test release PR owner matrix generation and staged branch validation against temporary fixtures

  audit:release-staging-pr-plan:self-test:
    run: dart run tools/production/release_staging_pr_plan_self_test.dart
    description: Self-test release staging classification and PR split pathspec coverage against a temporary dirty git fixture

  audit:docs-links:
    run: dart run tools/production/docs_link_audit.dart
    description: Check local Markdown links under docs and write release-readiness evidence

  audit:release-docs:
    run: dart run tools/production/release_docs_audit.dart
    description: Verify release-critical docs include required sections and cross-links

  audit:release-docs:self-test:
    run: dart run tools/production/release_docs_audit_self_test.dart
    description: Self-test release docs audit against complete and deficient temporary fixtures

  audit:platform-capabilities:
    run: dart run tools/production/platform_capability_audit.dart
    description: Verify platform capability model, UI gating, headless API exposure, docs, and tests stay aligned

  audit:platform-capabilities:self-test:
    run: dart run tools/production/platform_capability_audit_self_test.dart
    description: Self-test platform capability audit against complete and deficient temporary fixtures

  smoke:headless:windows:
    run: dart run tools/production/headless_windows_smoke.dart
    description: Launch the packaged Windows headless app and verify API, dashboard, auth, and WebSocket heartbeat

  smoke:headless-lan:windows:
    run: dart run tools/production/headless_lan_windows_smoke.dart
    description: Launch the packaged Windows headless app and verify authenticated LAN-address API, dashboard, and WebSocket access

  smoke:dashboard-browser:windows:
    run: dart run tools/production/dashboard_browser_smoke.dart
    description: Launch the packaged Windows headless app and verify the dashboard in headless Chrome or Edge

  smoke:dashboard-reconnect:windows:
    run: dart run tools/production/dashboard_browser_smoke.dart --verify-reconnect
    description: Launch the packaged Windows dashboard in Chrome and verify WebSocket reconnect after a server restart

  smoke:mobile-android-remote:windows:
    run: dart run tools/production/mobile_android_remote_smoke.dart
    description: Install the Android release APK and verify it connects to the packaged Windows headless server

  smoke:mobile-android-reconnect:windows:
    run: dart run tools/production/mobile_android_remote_smoke.dart --verify-reconnect
    description: Verify the Android remote client reconnects after the packaged Windows headless server restarts

  format:
    run: dart run melos exec -- dart format .
    description: Format all packages

  test:
    run: dart run melos exec -- flutter test
    description: Run tests in all packages
    packageFilters:
      flutter: true

  # ==========================================================================
  # Production Builds
  # ==========================================================================

  build:desktop:windows:
    run: |
      cargo build --release --manifest-path native/nightshade_native/bridge/Cargo.toml
      dart run melos exec --scope="nightshade_desktop" -- flutter build windows
    description: Build Windows desktop app

  build:desktop:macos:
    run: |
      cargo build --release --target x86_64-apple-darwin --manifest-path native/nightshade_native/bridge/Cargo.toml || cargo build --release --target aarch64-apple-darwin --manifest-path native/nightshade_native/bridge/Cargo.toml
      dart run melos exec --scope="nightshade_desktop" -- flutter build macos
    description: Build macOS desktop app

  build:desktop:linux:
    run: |
      cargo build --release --manifest-path native/nightshade_native/bridge/Cargo.toml
      dart run melos exec --scope="nightshade_desktop" -- flutter build linux
    description: Build Linux desktop app

  build:mobile:android:
    run: dart run melos exec --scope="nightshade_mobile" -- flutter build apk
    description: Build Android app

  build:mobile:ios:
    run: dart run melos exec --scope="nightshade_mobile" -- flutter build ios
    description: Build iOS app

  build:mobile:ios:simulator:
    run: dart run melos exec --scope="nightshade_mobile" -- flutter build ios --simulator
    description: Build iOS app for simulator (no signing required)

  run:mobile:ios:
    run: dart run melos exec --scope="nightshade_mobile" -- flutter run -d iphone
    description: Run iOS app on connected device or simulator

  generate:
    run: dart run melos exec --depends-on=build_runner -- dart run build_runner build --delete-conflicting-outputs
    description: Run build_runner in all packages

  clean:
    run: melos exec -- flutter clean
    description: Clean all packages

  # ==========================================================================
  # SDK/DLL Copy Scripts
  # ==========================================================================

  copy:fujifilm:
    run: powershell -ExecutionPolicy Bypass -File scripts/copy_fujifilm_sdk.ps1 -Release
    description: Copy Fujifilm X Acquire SDK DLLs to Release build output

  copy:fujifilm:debug:
    run: powershell -ExecutionPolicy Bypass -File scripts/copy_fujifilm_sdk.ps1 -Debug
    description: Copy Fujifilm X Acquire SDK DLLs to Debug build output
