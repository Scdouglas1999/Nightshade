# Fail-Closed Policy Rules
#
# Declarative rule set for tools/production/fail_closed_check.dart.
# Each rule applies one regex to all files matching one glob.
#
# Field semantics:
#   id                : stable rule identifier (used in violation output).
#   description       : human-readable summary of the policy.
#   glob              : path glob (relative to repo root). Supports `*` (any
#                       chars except `/`), `**` (any chars including `/`),
#                       `?` (single char). Tested against forward-slash form
#                       of every file under the workspace.
#   forbidden_pattern : Dart RegExp that, when matched in a file, fails the
#                       gate.
#   case_sensitive    : optional; default true.
#   multi_line        : optional; default false. Set true to allow `^`/`$`
#                       to match line boundaries inside the source.
#   since_version     : the Nightshade version in which this rule started
#                       being enforced. Informational only — used in the
#                       audit report so a reviewer knows the rule's age.
#   require_present   : optional; if true, the rule fails when ZERO files
#                       match the glob (catches accidental file deletions
#                       breaking previous regression pins).
#
# Notes:
# - `catch (_)` and `e.toString()` are policed only on the headless API
#   handlers and HTTP server surface. We don't want to ban these entirely
#   from the codebase yet — that's W3-AUDIT-TRIAGE territory.
# - Adding a new fail-closed rule should be a YAML edit, never a code edit.

rules:
  - id: bridge_unimplemented
    description: Disallow UnimplementedError in production backend paths
    glob: packages/nightshade_bridge/lib/src/bridge_stub.dart
    forbidden_pattern: 'UnimplementedError\('
    require_present: true
    since_version: 2.5.0

  - id: ffi_backend_unimplemented
    description: Disallow UnimplementedError in production backend paths
    glob: packages/nightshade_core/lib/src/backend/ffi_backend.dart
    forbidden_pattern: 'UnimplementedError\('
    require_present: true
    since_version: 2.5.0

  - id: network_backend_unimplemented
    description: Disallow UnimplementedError in production backend paths
    glob: packages/nightshade_core/lib/src/backend/network_backend.dart
    forbidden_pattern: 'UnimplementedError\('
    require_present: true
    since_version: 2.5.0

  - id: bridge_stub_noop_log
    description: Disallow sequencer checkpoint no-op stub logging
    glob: packages/nightshade_bridge/lib/src/bridge_stub.dart
    forbidden_pattern: 'sequencer.*no-op in stub mode'
    case_sensitive: false
    require_present: true
    since_version: 2.5.0

  - id: focuser_halt_noop
    description: Disconnected backend focuserHalt must not be a no-op
    glob: packages/nightshade_core/lib/src/backend/disconnected_backend.dart
    forbidden_pattern: 'Future<void>\s+focuserHalt\s*\([^)]*\)\s*async\s*\{\s*\}'
    multi_line: true
    require_present: true
    since_version: 2.5.0

  - id: autofocus_cancel_noop
    description: Disconnected backend autofocusCancel must not be a no-op
    glob: packages/nightshade_core/lib/src/backend/disconnected_backend.dart
    forbidden_pattern: 'Future<void>\s+autofocusCancel\s*\([^)]*\)\s*async\s*\{\s*\}'
    multi_line: true
    require_present: true
    since_version: 2.5.0

  - id: targets_dao_return_all
    description: Targets DAO must not return all targets for observability filtering
    glob: packages/nightshade_core/lib/src/database/daos/targets_dao.dart
    forbidden_pattern: 'For now,\s*return all targets'
    case_sensitive: false
    require_present: true
    since_version: 2.5.0

  # §7B.3 added rules — apply across the headless API handler surface so
  # that new handlers are policed by construction, not by allowlist.

  - id: handlers_status_failed_string
    description: >-
      Handlers must not return HTTP 200 with `'status': 'failed'` literal —
      use the failure helper that sets a non-2xx status code.
    glob: apps/desktop/lib/headless_api/handlers/**/*.dart
    forbidden_pattern: "['\"]status['\"]\\s*:\\s*['\"]failed['\"]"
    since_version: 2.5.0

  - id: handlers_empty_catch
    description: >-
      `catch (_)` in headless API handlers swallows runtime failures and
      breaks the headless contract that errors propagate as 5xx.
    glob: apps/desktop/lib/headless_api/handlers/**/*.dart
    forbidden_pattern: 'catch\s*\(\s*_\s*\)'
    since_version: 2.5.0

  - id: handlers_e_tostring
    description: >-
      Returning `e.toString()` in headless JSON bodies leaks stack traces
      and runtime types to the network. Use the structured error helper.
    glob: apps/desktop/lib/headless_api/handlers/**/*.dart
    forbidden_pattern: 'e\.toString\(\)'
    since_version: 2.5.0
