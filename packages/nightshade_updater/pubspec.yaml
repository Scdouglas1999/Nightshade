name: nightshade_updater
description: Nightshade 2.0 OTA Update System - Self-hosted updates with LAN push support
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  http: ^1.1.2
  path_provider: ^2.1.2
  path: ^1.8.3
  archive: ^3.4.10
  crypto: ^3.0.3
  cryptography: ^2.7.0
  nightshade_core:
    path: ../nightshade_core
  nightshade_ui:
    path: ../nightshade_ui

dev_dependencies:
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  mocktail: ^1.0.0

dependency_overrides:
  build_resolvers: 2.4.2

flutter:
  uses-material-design: true
