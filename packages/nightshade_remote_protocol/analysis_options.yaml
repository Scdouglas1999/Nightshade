# Inherits from the workspace-root analysis_options.yaml which configures
# flutter_lints 5.x rule overrides.
include: ../../analysis_options.yaml

# CQ-W14-CONST-CONSTRUCTORS:4 (audit-dart §10 #3)
# Slice 4 of the per-package rollout — final slice. nightshade_remote_protocol is
# minimal UI; no hand-written generated artifacts under lib/ beyond what
# the workspace-root exclude block already covers.
linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
