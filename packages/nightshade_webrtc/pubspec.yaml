name: nightshade_webrtc
description: Nightshade 2.0 WebRTC - P2P communication for remote control
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  pointycastle: ^3.7.0
  crypto: ^3.0.0
  drift: ^2.15.0
  path_provider: ^2.1.0
  path: ^1.8.3
  nsd: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Pinned exact version across all 10 workspace packages to prevent
  # mixed-version drift. See docs/code-quality/audit-dart.md §10 #4.
  # Upgrade to ^5.0.0 is scheduled in W-TEST / CQ-W5-LINTS-UPGRADE.
  flutter_lints: 3.0.2
  drift_dev: ^2.15.0
  build_runner: ^2.4.0
  mocktail: ^1.0.0
