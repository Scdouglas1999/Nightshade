version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  vector_math: ^2.1.4
  collection: ^1.18.0
  http: ^1.2.0
  path: ^1.8.3
  geolocator: ^14.0.2
  lucide_icons: ^0.257.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
