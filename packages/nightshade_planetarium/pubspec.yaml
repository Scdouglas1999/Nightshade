name: nightshade_planetarium
description: Nightshade 2.0 Planetarium - Flutter GPU sky renderer
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  vector_math: ^2.1.4
  collection: ^1.18.0
  http: ^1.2.0
  path: ^1.8.3
  geolocator: ^14.0.2
  lucide_icons: ^0.257.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Pinned exact version across all 10 workspace packages to prevent
  # mixed-version drift. Upgraded from 3.0.2 to ^5.0.0 by CQ-W5-LINTS-UPGRADE
  # (audit-dart §10 #3).
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
