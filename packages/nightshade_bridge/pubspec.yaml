name: nightshade_bridge
description: Nightshade 2.0 Bridge - Dart FFI bindings to Rust native code
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.11.1
  freezed_annotation: ^2.4.1
  ffi: ^2.1.0
  http: ^1.1.0
  path_provider: ^2.1.2
  path: ^1.8.3
  win32: ^5.0.0  # For native Windows ASCOM support via COM
  xml: ^6.4.2  # For INDI XML protocol parsing

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Pinned across all 10 workspace packages to prevent mixed-version drift.
  # Upgraded from 3.0.2 to ^5.0.0 by CQ-W5-LINTS-UPGRADE (audit-dart §10 #3).
  # Noisy new rules (override_on_non_overriding_member, super_formal_parameter_*,
  # use_string_in_part_of_directives, deprecated_member_use_from_same_package)
  # are disabled at the workspace root analysis_options.yaml. Lint-debt sweep
  # against the new ruleset is tracked as a follow-on per CQ-W5-LINTS-UPGRADE.
  flutter_lints: ^5.0.0
  ffigen: ^11.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
