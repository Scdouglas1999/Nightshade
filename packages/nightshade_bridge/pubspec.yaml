name: nightshade_bridge
description: Nightshade 2.0 Bridge - Dart FFI bindings to Rust native code
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: ^2.11.1
  freezed_annotation: ^2.4.1
  ffi: ^2.1.0
  http: ^1.1.0
  path_provider: ^2.1.2
  path: ^1.8.3
  win32: ^5.0.0  # For native Windows ASCOM support via COM
  xml: ^6.4.2  # For INDI XML protocol parsing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  ffigen: ^11.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
