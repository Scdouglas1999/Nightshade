# Inherits from the workspace-root analysis_options.yaml which configures
# flutter_lints 5.x rule overrides. Bridge-specific strict modes preserved.
include: ../../analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  # CQ-W12-CONST-CONSTRUCTORS:2 (audit-dart §10 #3)
  # FRB-generated code (api.dart + lib/src/api/** + frb_generated*) is
  # regenerated wholesale by `flutter_rust_bridge_codegen generate`, which
  # wipes any hand-edited `const` annotations on its next run. Exclude
  # those paths from analysis here so the rules below only apply to the
  # hand-written portion of lib/.
  exclude:
    - "**/frb_generated*.dart"
    - "**/api.dart"
    - "**/api/**"

# CQ-W12-CONST-CONSTRUCTORS:2 (audit-dart §10 #3)
# Slice 2 of the per-package rollout that began with nightshade_ui under
# CQ-W11-CONST-CONSTRUCTORS:ui. The workspace-root config disables these
# two rules globally; nightshade_bridge enables them here, with the
# generator-output paths excluded above so the rules cannot fight
# regenerated code.
linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
