name: nightshade_app
description: Unified Nightshade application UI
version: 0.0.1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  nightshade_core:
    path: ../nightshade_core
  nightshade_bridge:
    path: ../nightshade_bridge
  nightshade_ui:
    path: ../nightshade_ui
  nightshade_webrtc:
    path: ../nightshade_webrtc
  nightshade_planetarium:
    path: ../nightshade_planetarium
  nightshade_plugins:
    path: ../nightshade_plugins
  nightshade_updater:
    path: ../nightshade_updater

  # Other dependencies
  go_router: ^14.0.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  window_manager: ^0.3.8
  lucide_icons: ^0.257.0
  file_selector: ^1.0.3
  url_launcher: ^6.2.4
  intl: ^0.20.2
  collection: ^1.18.0
  equatable: ^2.0.5
  uuid: ^4.3.3
  image: ^4.1.7
  path: ^1.8.3
  drift: ^2.15.0
  fl_chart: ^0.68.0
  share_plus: ^7.2.2
  csv: ^6.0.0
  pdf: ^3.10.8
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Pinned across all 10 workspace packages to prevent mixed-version drift.
  # Upgraded from 3.0.2 to ^5.0.0 by CQ-W5-LINTS-UPGRADE (audit-dart §10 #3).
  flutter_lints: ^5.0.0
  # Why: widget-test harness (test/harness/) uses mocktail's `Mock` base to
  # implement `NightshadeBackend` without restating ~700 LoC of method
  # signatures. Matches the version already pinned in nightshade_core.
  # Tracked: docs/code-quality/audit-tests.md §6 (CQ-W5-WIDGET-HARNESS).
  mocktail: ^1.0.0

flutter:
  uses-material-design: true
