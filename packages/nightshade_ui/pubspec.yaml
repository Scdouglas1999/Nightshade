name: nightshade_ui
description: Nightshade 2.0 UI Design System - Shared components and theming
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  lucide_icons: ^0.257.0
  google_fonts: ^6.1.0
  nightshade_core:
    path: ../nightshade_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Pinned exact version across all 10 workspace packages to prevent
  # mixed-version drift. Upgraded from 3.0.2 to ^5.0.0 by CQ-W5-LINTS-UPGRADE
  # (audit-dart §10 #3).
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true




