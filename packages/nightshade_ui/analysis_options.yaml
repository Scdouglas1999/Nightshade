# Inherits from the workspace-root analysis_options.yaml which configures
# flutter_lints 5.x rule overrides.
include: ../../analysis_options.yaml

# CQ-W11-CONST-CONSTRUCTORS:ui (audit-dart §10 #3)
# The workspace-root config disables prefer_const_constructors and
# prefer_const_literals_to_create_immutables because of the ~2,232 total
# findings across packages (concentrated in nightshade_planetarium and
# nightshade_core). Now that W-DECOMP per-screen splits are done, we
# enable these rules package-by-package starting with the smallest
# (nightshade_ui) as a proof point. The other packages still inherit
# the disabled state from the workspace-root file.
linter:
  rules:
    prefer_const_constructors: true
    prefer_const_literals_to_create_immutables: true
